name: Promptfoo Eval

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MODEL_NAME: ${{ vars.MODEL_NAME || 'gpt-5.4-mini' }}

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Package installieren ──────────────────────────────────────────────
      - name: agenteval-ovb installieren (pip install -e .)
        run: pip install -e .

      # ── Funktionalitäts-Abhängigkeiten (deepeval etc.) ────────────────────
      - name: Funktionalität – Python-Abhängigkeiten installieren
        run: pip install -r evals/functionality/requirements.txt

      # ── R0: Smoke Test ────────────────────────────────────────────────────
      - name: R0 – Hello-World Smoke Test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx promptfoo@latest eval --no-cache --config promptfooconfig.yaml

      # ── R2: Sicherheit ────────────────────────────────────────────────────
      - name: R2 – Sicherheits-Taxonomie (AgentDojo / InjecAgent)
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx promptfoo@latest eval --no-cache --config evals/security/security_eval.yaml --output security_results.json

      - name: R2 – Wirtschaftlichkeits-Report (Token-Kosten & Latenz)
        continue-on-error: true
        run: node scripts/cost_report.js security_results.json

      # ── R2: Sicherheit Finance-Kontext ────────────────────────────────────
      - name: R2 – Sicherheits-Taxonomie Finance-Kontext (manuell kuratiert)
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx promptfoo@latest eval --no-cache --config evals/security/security_eval_finance.yaml --output security_finance_results.json

      - name: R2 – Wirtschaftlichkeits-Report Finance-Kontext
        continue-on-error: true
        run: node scripts/cost_report.js security_finance_results.json

      # ── R3: Compliance ────────────────────────────────────────────────────
      - name: R3 – EU AI Act Compliance
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx promptfoo@latest eval --no-cache --config evals/compliance/compliance_eval.yaml --output compliance_results.json

      - name: R3 – Wirtschaftlichkeits-Report (Token-Kosten & Latenz)
        continue-on-error: true
        run: node scripts/cost_report.js compliance_results.json

      - name: R3 – Compliance Scorecard (EU AI Act Mapping)
        continue-on-error: true
        run: agenteval-scorecard compliance_results.json

      # ── Funktionalität: LangGraph + DeepEval ─────────────────────────────
      - name: Funktionalität – Multi-Step Agent Eval (LangGraph + DeepEval)
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
          DEEPEVAL_DISABLE_DOTENV: "1"
        run: cd evals/functionality && deepeval test run test_functionality.py -v

      # ── HTML-Report ───────────────────────────────────────────────────────
      - name: Benchmark-Report HTML generieren
        if: always()
        run: agenteval-report --out report.html

      # ── Artefakte sichern ─────────────────────────────────────────────────
      - name: Upload Eval Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            security_results.json
            security_finance_results.json
            compliance_results.json
            compliance_scorecard.json
            evals/functionality/functionality_costs.json
            report.html
