name: Promptfoo Eval

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: agenteval-ovb installieren (pip install -e .)
        run: pip install -e .

      - name: Funktionalität – Python-Abhängigkeiten installieren
        run: pip install -r evals/functionality/requirements.txt

      # ── R0: Smoke Test ────────────────────────────────────────────────────
      - name: R0 – Hello-World Smoke Test
        env:
          OPENAI_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: npx promptfoo@latest eval --no-cache --config promptfooconfig.yaml

      # ── R2 + R3: Security & Compliance – alle Agenten ─────────────────────
      - name: R2/R3 – Security & Compliance (alle Agenten aus agents.yaml)
        continue-on-error: true
        env:
          AGENT_API_KEY:      ${{ secrets.AGENT_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/run_promptfoo_multi_agent.py

      # ── Funktionalität: LangGraph + DeepEval – alle Agenten ───────────────
      - name: Funktionalität – Multi-Step Agent Eval (LangGraph + DeepEval)
        continue-on-error: true
        env:
          AGENT_API_KEY:      ${{ secrets.AGENT_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JUDGE_API_KEY:      ${{ secrets.JUDGE_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
          DEEPEVAL_DISABLE_DOTENV: "1"
        run: cd evals/functionality && deepeval test run test_functionality.py -v

      # ── HTML-Report ───────────────────────────────────────────────────────
      - name: Benchmark-Report HTML generieren
        if: always()
        run: agenteval-report --out report.html

      # ── Artefakte sichern ─────────────────────────────────────────────────
      - name: Upload Eval Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            *_results_*.json
            *_scorecard_*.json
            evals/functionality/functionality_costs_*.json
            report.html
