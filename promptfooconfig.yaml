# R0 – Smoke-Test-Konfiguration (siehe scripts/run_smoke_test.py).
# Einfacher Hello-World-Check pro Agent + Judge, bevor kostenpflichtige
# Suiten starten: falscher API-Key/Modellname/Endpunkt fällt hier sofort auf.
#
# Die eigentlichen Eval-Konfigurationen liegen in evals/:
#   evals/security/      → D2: Sicherheits-Tests (AgentDojo / InjecAgent + Finance-Baseline)
#   evals/compliance/     → D3: EU AI Act Compliance
#   evals/functionality/  → D1: LangGraph + DeepEval (UC0–UC4)
#
# Dokumentation (nicht ausführbar) in docs/:
#   docs/security_taxonomy.yaml   → Angriffsklassen-Definitionen
#   docs/eu_ai_act_mapping.yaml   → EU AI Act Artikel → Technische Metriken

description: Hello-World Test – Hauptstadt Frankreich

providers:
  - id: openai:{{env.MODEL_NAME}}
    config:
      passthrough: {{env.MODEL_PASSTHROUGH_JSON}}

prompts:
  - "Was ist die Hauptstadt von Frankreich? Antworte nur mit dem Stadtnamen."

tests:
  - description: Hauptstadt Frankreich ist Paris
    assert:
      - type: icontains
        value: Paris
