# Agent-Konfigurationen für Agent-Eval@OVB
#
# Jeder Eintrag definiert einen zu testenden KI-Agenten.
# Das Framework führt alle Tests für jeden Agenten durch und
# erzeugt am Ende einen gemeinsamen HTML-Report.
#
# api_key_env: Name der Umgebungsvariable in .env, die den API-Key enthält.
#              Generische, anbieterunabhängige Namen (AGENT_API_KEY_1,
#              AGENT_API_KEY_2, ...) – beliebig viele, verwaltet über die
#              Web-App (Tab "API & Modelle").
# api_base:    PFLICHTFELD für jeden Agenten und den Judge – auch für OpenAI.
#              Macht den tatsächlich verwendeten Endpunkt immer explizit
#              sichtbar und verhindert einen versehentlichen Fallback auf
#              einen falschen Standard-Endpunkt.
#
#   OpenAI:      api_base: https://api.openai.com/v1
#   OpenRouter:  api_base: https://openrouter.ai/api/v1
#                (Proxy für Anthropic/Gemini/Llama etc.)
#                model: anthropic/claude-3-haiku | google/gemini-flash-1.5 | meta-llama/...
#
# provider_pin (NUR für OpenRouter relevant, optional): erzwingt einen
# konkreten Hosting-Anbieter für dieses Modell über OpenRouters
# provider.only-Parameter (siehe scripts/run_promptfoo_multi_agent.py,
# evals/functionality/agent/graph.py). Ohne provider_pin routet OpenRouter
# denselben Modellnamen je nach Verfügbarkeit an viele verschiedene Hosts
# mit TEILS STARK UNTERSCHIEDLICHEN Preisen für dasselbe Modell (real
# gemessen: bis Faktor 3,4 Unterschied bei openai/gpt-oss-120b je
# Anbieter) – die Preistabelle in pricing.py kann das ohne Pin nicht
# zuverlässig abbilden. Bei direktem Zugriff auf eine Provider-API
# (api_base zeigt NICHT auf openrouter.ai) einfach weglassen – dort gibt
# es ohnehin nur einen Anbieter, also keine Preis-Varianz.
# Empfehlung: einen Anbieter mit hoher Uptime UND einem Preis wählen, der
# auch als eigenständige Direkt-API existiert (z. B. DeepInfra, Google) –
# dann gilt der hinterlegte Preis unverändert, falls später direkt statt
# über OpenRouter auf diesen Anbieter zugegriffen wird.

# ── Judge (LLM-as-Judge für alle Evaluationen) ────────────────────────────────
# api_key_env bleibt JUDGE_API_KEY, auch wenn das Modell über OpenRouter läuft –
# der Judge-Key wird strikt getrennt von den Agenten-Keys verwaltet. In .env
# unter JUDGE_API_KEY den eigenen OpenRouter-Key eintragen (api_base bestimmt
# den Provider, nicht der Name der Env-Variable).
judge:
  model: openai/gpt-oss-120b
  provider_pin: DeepInfra
  api_key_env: JUDGE_API_KEY
  api_base: https://openrouter.ai/api/v1

agents:
  - id: deepseek-v4-flash
    label: "DeepSeek V4 Flash (OpenRouter)"
    model: deepseek/deepseek-v4-flash
    # Kein provider_pin (Ausnahme): Rate-Limits bei einzelnen Anbietern
    # (DeepInfra, dann Baidu) machten den Lauf unzuverlaessig. OpenRouter
    # verteilt Anfragen ohne Pin automatisch ueber alle verfuegbaren
    # Anbieter - Preis in pricing.py bleibt als Naeherung (DeepInfra-Preis)
    # bewusst unangetastet, siehe Chat vom 2026-07-08.
    api_key_env: AGENT_API_KEY_2
    api_base: https://openrouter.ai/api/v1

  - id: gemini-2.5-flash-lite
    label: "Gemini 2.5 Flash Lite (OpenRouter)"
    model: google/gemini-2.5-flash-lite
    provider_pin: Google
    api_key_env: AGENT_API_KEY_2
    api_base: https://openrouter.ai/api/v1

  - id: mistral-small-3.2-24b
    label: "Mistral Small 3.2 24B (OpenRouter)"
    model: mistralai/mistral-small-3.2-24b-instruct
    provider_pin: DeepInfra
    api_key_env: AGENT_API_KEY_2
    api_base: https://openrouter.ai/api/v1
