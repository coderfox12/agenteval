# Agent-Konfigurationen für Agent-Eval@OVB
#
# Jeder Eintrag definiert einen zu testenden KI-Agenten.
# Das Framework führt alle Tests für jeden Agenten durch und
# erzeugt am Ende einen gemeinsamen HTML-Report.
#
# api_key_env: Name der Umgebungsvariable in .env, die den API-Key enthält.
# api_base:    PFLICHTFELD für jeden Agenten und den Judge – auch für OpenAI.
#              Macht den tatsächlich verwendeten Endpunkt immer explizit
#              sichtbar und verhindert einen versehentlichen Fallback auf
#              einen falschen Standard-Endpunkt.
#
#   OpenAI:      api_base: https://api.openai.com/v1
#   OpenRouter:  api_base: https://openrouter.ai/api/v1
#                (Proxy für Anthropic/Gemini/Llama etc.)
#                model:       anthropic/claude-3-haiku  |  google/gemini-flash-1.5  |  meta-llama/...
#                api_key_env: OPENROUTER_API_KEY
#
# OpenRouter-Suffix ":floor" am Modellnamen erzwingt automatisch den
# günstigsten verfügbaren Anbieter für dieses Modell (Gegenstück: ":nitro"
# für den schnellsten). Reiner Bestandteil des model-Strings, daher ohne
# Code-Änderung wirksam – pricing.py löst den Preis trotz Suffix korrekt auf
# (Prefix-Matching).

# ── Judge (LLM-as-Judge für alle Evaluationen) ────────────────────────────────
# api_key_env bleibt JUDGE_API_KEY, auch wenn das Modell über OpenRouter läuft –
# der Judge-Key wird strikt getrennt von den Agenten-Keys verwaltet. In .env
# unter JUDGE_API_KEY den eigenen OpenRouter-Key eintragen (api_base bestimmt
# den Provider, nicht der Name der Env-Variable).
judge:
  model: openai/gpt-oss-120b:floor
  api_key_env: JUDGE_API_KEY
  api_base: https://openrouter.ai/api/v1

agents:
  - id: deepseek-v4-flash
    label: "DeepSeek V4 Flash (OpenRouter)"
    model: deepseek/deepseek-v4-flash:floor
    api_key_env: OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1

  - id: gemini-2.5-flash-lite
    label: "Gemini 2.5 Flash Lite (OpenRouter)"
    model: google/gemini-2.5-flash-lite:floor
    api_key_env: OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
