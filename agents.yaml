# Agent-Konfigurationen für Agent-Eval@OVB
#
# Jeder Eintrag definiert einen zu testenden KI-Agenten.
# Das Framework führt alle Tests für jeden Agenten durch und
# erzeugt am Ende einen gemeinsamen HTML-Report.
#
# api_key_env: Name der Umgebungsvariable in .env, die den API-Key enthält.
# api_base:    Nur setzen für nicht-OpenAI-Endpunkte (z. B. OpenRouter).
#              Weglassen → Standard-OpenAI-Endpunkt wird verwendet.
#
# Für Anthropic/Gemini/Llama etc.: OpenRouter als Proxy nutzen.
#   model:    anthropic/claude-3-haiku  |  google/gemini-flash-1.5  |  meta-llama/...
#   api_base: https://openrouter.ai/api/v1
#   api_key_env: OPENROUTER_API_KEY

# ── Judge (LLM-as-Judge für alle Evaluationen) ────────────────────────────────
# Fester Judge → vergleichbare Bewertung für alle getesteten Agenten.
# Läuft hier kostenlos über OpenRouter (kein Guthaben nötig).
judge:
  model: openai/gpt-oss-120b:free
  api_key_env: OPENROUTER_API_KEY
  api_base: https://openrouter.ai/api/v1

agents:
  # Agent 1: GPT-OSS 120B (kostenlos über OpenRouter, Tool-Calling verifiziert)
  - id: gpt-oss-free
    label: "GPT-OSS 120B (OpenRouter, kostenlos)"
    model: openai/gpt-oss-120b:free
    api_key_env: OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1

  # Agent 2: Gemma 4 31B (kostenlos, ebenfalls Tool-fähig) – für Modellvergleich
  - id: gemma-free
    label: "Gemma 4 31B (OpenRouter, kostenlos)"
    model: google/gemma-4-31b-it:free
    api_key_env: OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1

  # Agent 3: OpenAI ChatGPT – aktivieren wenn OpenAI-Guthaben vorhanden
  # - id: openai-gpt
  #   label: "GPT-4o-mini (OpenAI)"
  #   model: gpt-4o-mini
  #   api_key_env: OPENAI_API_KEY
