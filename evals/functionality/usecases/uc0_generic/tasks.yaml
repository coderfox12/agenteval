# Finanzgesellschaft Multi-Step-Tasks für die Funktionalitäts-Evaluation
# Jeder Task testet einen vollständigen Agenten-Workflow über mehrere Schritte.
# Bewertet mit DeepEval: ToolCorrectnessMetric, TaskCompletionMetric, AnswerRelevancyMetric

tasks:

  - id: "FUNC-01"
    description: "Standardberatung – Altersvorsorge für mittleres Risikoprofil"
    input: >
      Erstelle eine IDD-konforme Beratungsempfehlung für Kunde K-001.
      Er interessiert sich für Altersvorsorge mit einem monatlichen Budget von 300 EUR.
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Empfehlung für ein geeignetes Altersvorsorgeprodukt (z.B. FIN-PENSION-CLASSIC
      oder FIN-INVEST-GROWTH) mit Begründung auf Basis der IDD-Eignungsprüfung.
    should_escalate: false
    deepeval_task: >
      Der Agent soll das Kundenprofil abrufen, geeignete Produkte prüfen,
      eine IDD-Eignungsprüfung durchführen und eine begründete Produktempfehlung
      für die Altersvorsorge des Kunden erstellen.

  - id: "FUNC-02"
    description: "Eskalation – Ältere Kundin mit niedrigem Risikoprofil und kurzem Horizont"
    input: >
      Prüfe für Kundin K-002 (68 Jahre, niedriges Risikoprofil) die Eignung
      für FIN-INVEST-DYNAMIC-30 und leite entsprechende Schritte ein.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      Feststellung der Nicht-Eignung (Risikoprofil und Anlagehorizont passen nicht)
      und Eskalation an einen menschlichen Berater mit klarer Begründung.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die Nicht-Eignung des Produkts für die Kundin erkennen
      (zu hohes Risiko, zu langer Horizont) und den Fall korrekt eskalieren,
      anstatt eine ungeeignete Empfehlung auszusprechen.

  - id: "FUNC-03"
    description: "Unvollständige Daten – fehlende Risikoprofilierung"
    input: >
      Kunde K-004 möchte ein geeignetes Anlageprodukt. Bitte erstelle eine
      Empfehlung für FIN-PENSION-CLASSIC.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      Erkennung des unvollständigen Profils (fehlendes Risikoprofil und Anlagehorizont),
      keine ungeprüfte Produktempfehlung, stattdessen Eskalation oder
      Anforderung fehlender Daten.
    should_escalate: true
    deepeval_task: >
      Der Agent soll erkennen, dass das Kundenprofil unvollständig ist
      (Risikoprofil fehlt), die Eignungsprüfung korrekt ausführen,
      und keine Produktempfehlung ohne vollständige Datenbasis abgeben.

  - id: "FUNC-04"
    description: "Produktkatalog-Übersicht – vollständiger Produktvergleich"
    input: >
      Welche Finance-Produkte sind aktuell verfügbar und welche
      Mindestanforderungen haben sie? Erstelle eine übersichtliche Zusammenfassung
      aller Produkte mit Risikoprofil, Mindestbudget und Mindest-Anlagehorizont.
    expected_tools:
      - get_product_catalog
    expected_output: >
      Strukturierte Übersicht aller verfügbaren Produkte (FIN-PENSION-CLASSIC,
      FIN-INVEST-GROWTH, FIN-LIFE-PREMIUM, FIN-INVEST-DYNAMIC-30) mit
      Mindestbudget, Risikoprofil-Anforderungen und Mindest-Anlagehorizont.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Produktkatalog abrufen und eine strukturierte,
      vollständige Übersicht aller vier verfügbaren Produkte erstellen,
      ohne unnötige Tool-Aufrufe zu machen.

  - id: "FUNC-05"
    description: "Vollständiger Advisory-Flow – junger Kunde mit hohem Risikoprofil"
    input: >
      Neukunde K-003 (32 Jahre, hohes Risikoprofil, 500 EUR/Monat Budget)
      möchte langfristig Vermögen aufbauen. Führe eine vollständige Beratung durch
      und empfehle das am besten geeignete Produkt.
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Vollständige Beratungsempfehlung mit IDD-Eignungsnachweis für ein
      wachstumsorientiertes Produkt (FIN-INVEST-GROWTH oder FIN-INVEST-DYNAMIC-30),
      passend zu Risikoprofil und langem Anlagehorizont.
    should_escalate: false
    deepeval_task: >
      Der Agent soll das Kundenprofil abrufen (get_customer_profile), den
      Produktkatalog prüfen (get_product_catalog), eine IDD-Eignungsprüfung
      durchführen (check_idd_suitability) und eine begründete Empfehlung für
      ein wachstumsorientiertes Produkt (FIN-INVEST-GROWTH oder
      FIN-INVEST-DYNAMIC-30) aussprechen – passend zu seinem Profil
      (jung, hohes Risiko, langer Anlagehorizont von 30 Jahren).

  # ─── Eignungsprüfung einzelner Kunde×Produkt-Kombinationen ───────────────────

  - id: "FUNC-06"
    description: "Eignungsprüfung – mittleres Profil, wachstumsorientiertes Produkt geeignet"
    input: >
      Prüfe für Kunde K-001 die Eignung von FIN-INVEST-GROWTH und begründe das Ergebnis.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-INVEST-GROWTH ist für K-001 geeignet: Risikoprofil mittel im Rahmen mittel–hoch,
      Anlagehorizont 20 Jahre > Minimum 15 Jahre, Budget 300 EUR > 100 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll Profil und Eignung prüfen und die Eignung von FIN-INVEST-GROWTH für K-001
      begründet bestätigen.

  - id: "FUNC-07"
    description: "Eignungsprüfung – Lebensversicherung für mittleres Profil geeignet"
    input: >
      Ist FIN-LIFE-PREMIUM für Kunde K-001 geeignet?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-LIFE-PREMIUM ist für K-001 geeignet: Risikoprofil mittel im Rahmen niedrig–hoch,
      Horizont 20 Jahre > Minimum 5 Jahre, Budget 300 EUR > 30 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll die Eignung von FIN-LIFE-PREMIUM für K-001 prüfen und bestätigen.

  - id: "FUNC-08"
    description: "Eskalation – Hochrisikoprodukt für mittleres Profil ungeeignet"
    input: >
      Prüfe für Kunde K-001 die Eignung von FIN-INVEST-DYNAMIC-30 und leite die nötigen
      Schritte ein.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      FIN-INVEST-DYNAMIC-30 ist für K-001 nicht geeignet (Risikoprofil mittel außerhalb hoch–hoch,
      Horizont 20 Jahre < 30 Jahre). Eskalation an einen menschlichen Berater.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die Nicht-Eignung feststellen, keine Empfehlung aussprechen und eskalieren.

  - id: "FUNC-09"
    description: "Eignungsprüfung – Lebensversicherung für konservatives Profil geeignet"
    input: >
      Ist FIN-LIFE-PREMIUM für Kundin K-002 (68 Jahre, niedriges Risikoprofil) geeignet?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-LIFE-PREMIUM ist für K-002 geeignet: Risikoprofil niedrig im Rahmen niedrig–hoch,
      Horizont 5 Jahre = Minimum 5 Jahre, Budget 150 EUR > 30 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll die Eignung von FIN-LIFE-PREMIUM für K-002 prüfen und bestätigen; der
      Horizont von exakt 5 Jahren erfüllt gerade das Minimum.

  - id: "FUNC-10"
    description: "Eskalation – Altersvorsorge mit zu kurzem Horizont für K-002"
    input: >
      Prüfe für Kundin K-002 die Eignung von FIN-PENSION-CLASSIC und leite die nötigen
      Schritte ein.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      FIN-PENSION-CLASSIC ist für K-002 nicht geeignet: Anlagehorizont 5 Jahre < Minimum 10 Jahre.
      Eskalation an einen menschlichen Berater.
    should_escalate: true
    deepeval_task: >
      Der Agent soll erkennen dass der zu kurze Horizont die Eignung ausschließt, keine Empfehlung
      aussprechen und eskalieren.

  - id: "FUNC-11"
    description: "Eskalation – konservatives Profil, Wachstumsprodukt ungeeignet"
    input: >
      Ist FIN-INVEST-GROWTH für Kundin K-002 geeignet? Leite bei Nicht-Eignung die nötigen
      Schritte ein.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      FIN-INVEST-GROWTH ist für K-002 nicht geeignet (Risikoprofil niedrig außerhalb mittel–hoch,
      Horizont 5 Jahre < 15 Jahre). Eskalation an einen menschlichen Berater.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die doppelte Nicht-Eignung (Risikoprofil + Horizont) feststellen und
      eskalieren.

  - id: "FUNC-12"
    description: "Eskalation – hohes Profil, konservatives Produkt ungeeignet"
    input: >
      Prüfe für Neukunde K-003 (hohes Risikoprofil) die Eignung von FIN-PENSION-CLASSIC und
      leite die nötigen Schritte ein.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      FIN-PENSION-CLASSIC ist für K-003 nicht geeignet: Risikoprofil hoch außerhalb des Rahmens
      niedrig–mittel. Eskalation an einen menschlichen Berater.
    should_escalate: true
    deepeval_task: >
      Der Agent soll erkennen dass ein hohes Risikoprofil nicht zu einem niedrig–mittel-Produkt
      passt und eskalieren.

  - id: "FUNC-13"
    description: "Eignungsprüfung – hohes Profil, Wachstumsprodukt geeignet"
    input: >
      Ist FIN-INVEST-GROWTH für Neukunde K-003 geeignet?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-INVEST-GROWTH ist für K-003 geeignet: Risikoprofil hoch im Rahmen mittel–hoch,
      Horizont 30 Jahre > Minimum 15 Jahre, Budget 500 EUR > 100 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll die Eignung von FIN-INVEST-GROWTH für K-003 prüfen und bestätigen.

  - id: "FUNC-14"
    description: "Eignungsprüfung – hohes Profil, Hochrisikoprodukt geeignet"
    input: >
      Ist FIN-INVEST-DYNAMIC-30 für Neukunde K-003 (hohes Risikoprofil, 30 Jahre Horizont)
      geeignet?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-INVEST-DYNAMIC-30 ist für K-003 geeignet: Risikoprofil hoch im Rahmen hoch–hoch,
      Horizont 30 Jahre = Minimum 30 Jahre, Budget 500 EUR > 200 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll die Eignung von FIN-INVEST-DYNAMIC-30 für K-003 prüfen und bestätigen; der
      Horizont von exakt 30 Jahren erfüllt gerade das Minimum.

  - id: "FUNC-15"
    description: "Eignungsprüfung – Altersvorsorge für mittleres Profil geeignet"
    input: >
      Ist FIN-PENSION-CLASSIC für Kunde K-001 geeignet?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      FIN-PENSION-CLASSIC ist für K-001 geeignet: Risikoprofil mittel im Rahmen niedrig–mittel,
      Horizont 20 Jahre > Minimum 10 Jahre, Budget 300 EUR > 50 EUR.
    should_escalate: false
    deepeval_task: >
      Der Agent soll die Eignung von FIN-PENSION-CLASSIC für K-001 prüfen und bestätigen.

  # ─── Datenlücken (K-004) ─────────────────────────────────────────────────────

  - id: "FUNC-16"
    description: "Datenlücke – fehlendes Risikoprofil bei Wachstumsprodukt → Eskalation"
    input: >
      Kunde K-004 möchte FIN-INVEST-GROWTH abschließen. Bitte prüfe die Eignung.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      Eignungsprüfung nicht möglich: K-004 hat kein Risikoprofil (risk_profile=None).
      Keine Empfehlung ohne vollständige Daten. Eskalation zur Risikoprofilierung.
    should_escalate: true
    deepeval_task: >
      Der Agent soll das unvollständige Profil erkennen, keine Empfehlung aussprechen und zur
      Risikoprofilierung eskalieren.

  - id: "FUNC-17"
    description: "Datenlücke – fehlendes Risikoprofil bei Lebensversicherung → Eskalation"
    input: >
      Erstelle für Kunde K-004 eine Empfehlung für FIN-LIFE-PREMIUM.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      Auch für ein risikoarmes Produkt ist ohne Risikoprofil (K-004, risk_profile=None) keine
      Empfehlung zulässig. Eskalation zur Risikoprofilierung.
    should_escalate: true
    deepeval_task: >
      Der Agent soll erkennen dass auch bei einem risikoarmen Produkt ohne Risikoprofil keine
      Empfehlung möglich ist, und eskalieren.

  - id: "FUNC-18"
    description: "Datenlücke – fehlende Pflichtdaten explizit benennen"
    input: >
      Prüfe die Eignung von FIN-PENSION-CLASSIC für Kunde K-004 und benenne alle fehlenden
      Pflichtdaten.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      get_customer_profile weist die fehlenden Felder aus (risk_profile und
      investment_horizon_years). Eignungsprüfung nicht möglich, Eskalation zur
      Datenvervollständigung.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die fehlenden Pflichtfelder (Risikoprofil, Anlagehorizont) benennen und zur
      Datenvervollständigung eskalieren.

  # ─── Produktkatalog / Informationsabfragen ───────────────────────────────────

  - id: "FUNC-19"
    description: "Katalog – nur Altersvorsorgeprodukte auflisten"
    input: >
      Welche Altersvorsorgeprodukte bietet die Gesellschaft an?
    expected_tools:
      - get_product_catalog
    expected_output: >
      Gefilterte Übersicht der Produkte vom Typ Altersvorsorge (FIN-PENSION-CLASSIC) mit den
      wichtigsten Anforderungen. Keine unnötigen weiteren Tool-Aufrufe.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Katalog nach Typ 'Altersvorsorge' filtern und die passenden Produkte
      ausgeben.

  - id: "FUNC-20"
    description: "Katalog – nur Kapitalanlage-Produkte auflisten"
    input: >
      Zeig mir alle verfügbaren Kapitalanlage-Produkte mit ihren Mindestanforderungen.
    expected_tools:
      - get_product_catalog
    expected_output: >
      Gefilterte Übersicht der Kapitalanlage-Produkte (FIN-INVEST-GROWTH, FIN-INVEST-DYNAMIC-30)
      mit Risikoprofil, Mindestbudget und Mindesthorizont.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Katalog nach Typ 'Kapitalanlage' filtern und die beiden passenden Produkte
      ausgeben.

  - id: "FUNC-21"
    description: "Katalog – Lebensversicherungsprodukte auflisten"
    input: >
      Welche Lebensversicherungsprodukte gibt es und welche Mindestlaufzeit haben sie?
    expected_tools:
      - get_product_catalog
    expected_output: >
      Gefilterte Übersicht der Lebensversicherungsprodukte (FIN-LIFE-PREMIUM) mit Mindesthorizont
      (5 Jahre) und Mindestbudget (30 EUR).
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Katalog nach Typ 'Lebensversicherung' filtern und FIN-LIFE-PREMIUM mit
      Anforderungen ausgeben.

  - id: "FUNC-22"
    description: "Katalog – günstigstes Einstiegsprodukt identifizieren"
    input: >
      Welches Produkt hat das niedrigste monatliche Mindestbudget?
    expected_tools:
      - get_product_catalog
    expected_output: >
      FIN-LIFE-PREMIUM hat mit 30 EUR/Monat das niedrigste Mindestbudget aller Produkte im Katalog.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Katalog abrufen und FIN-LIFE-PREMIUM als Produkt mit dem niedrigsten
      Mindestbudget (30 EUR) identifizieren.

  - id: "FUNC-23"
    description: "Katalog – Produkt mit höchster erwarteter Rendite"
    input: >
      Welches Produkt hat die höchste erwartete Rendite und welche Anforderungen stellt es?
    expected_tools:
      - get_product_catalog
    expected_output: >
      FIN-INVEST-DYNAMIC-30 hat mit 8,5 % die höchste erwartete Rendite; Anforderungen: Risikoprofil
      hoch, Mindesthorizont 30 Jahre, Mindestbudget 200 EUR/Monat.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Katalog abrufen und FIN-INVEST-DYNAMIC-30 als renditestärkstes Produkt mit
      seinen Anforderungen nennen.

  # ─── Produktvergleich (Profil × Katalog) ─────────────────────────────────────

  - id: "FUNC-24"
    description: "Produktvergleich – geeignete Produkte für K-001"
    input: >
      Welche Produkte aus dem Katalog sind für Kunde K-001 (mittleres Risikoprofil, 20 Jahre
      Horizont) geeignet?
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Geeignet für K-001 sind FIN-PENSION-CLASSIC, FIN-INVEST-GROWTH und FIN-LIFE-PREMIUM.
      FIN-INVEST-DYNAMIC-30 ist nicht geeignet (Risikoprofil mittel außerhalb hoch–hoch,
      Horizont 20 J. < 30 J.).
    should_escalate: false
    deepeval_task: >
      Der Agent soll Profil und Katalog abrufen, alle Produkte prüfen und die drei geeigneten
      Produkte für K-001 identifizieren.

  - id: "FUNC-25"
    description: "Produktvergleich – nur ein geeignetes Produkt für K-002"
    input: >
      Welches Produkt aus dem Katalog ist für Kundin K-002 (68 Jahre, niedriges Risikoprofil,
      5 Jahre Horizont) geeignet?
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Nur FIN-LIFE-PREMIUM ist für K-002 geeignet. Die übrigen Produkte scheitern am zu kurzen
      Horizont und/oder am zu hohen Risikorahmen.
    should_escalate: false
    deepeval_task: >
      Der Agent soll erkennen dass für K-002 nur FIN-LIFE-PREMIUM geeignet ist, mit Begründung für
      die abgelehnten Produkte.

  - id: "FUNC-26"
    description: "Produktvergleich – geeignete Produkte für K-003"
    input: >
      Welche Produkte aus dem Katalog sind für Neukunde K-003 (hohes Risikoprofil, 30 Jahre
      Horizont, 500 EUR Budget) geeignet?
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Geeignet für K-003 sind FIN-INVEST-GROWTH, FIN-LIFE-PREMIUM und FIN-INVEST-DYNAMIC-30.
      FIN-PENSION-CLASSIC ist nicht geeignet (Risikoprofil hoch außerhalb niedrig–mittel).
    should_escalate: false
    deepeval_task: >
      Der Agent soll die drei geeigneten Produkte für K-003 identifizieren und
      FIN-PENSION-CLASSIC ausschließen.

  # ─── Fehlerbehandlung / Robustheit ───────────────────────────────────────────

  - id: "FUNC-27"
    description: "Fehlerbehandlung – unbekannte Kundennummer"
    input: >
      Erstelle eine Empfehlung für Kunde K-777.
    expected_tools:
      - get_customer_profile
      - escalate_to_human
    expected_output: >
      get_customer_profile meldet 'Kunde K-777 nicht im CRM gefunden'. Der Agent führt keine
      Beratung mit erfundenen Daten durch und eskaliert bzw. fordert eine gültige Kundennummer an.
    should_escalate: true
    deepeval_task: >
      Der Agent soll den Fehler 'Kunde nicht gefunden' erkennen, keine Empfehlung mit erfundenen
      Daten geben und eskalieren bzw. eine gültige ID anfordern.

  - id: "FUNC-28"
    description: "Fehlerbehandlung – unbekannte Produkt-ID in Eignungsprüfung"
    input: >
      Prüfe für Kunde K-001 die Eignung von FIN-CRYPTO-MAX.
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
    expected_output: >
      check_idd_suitability meldet 'Produkt FIN-CRYPTO-MAX nicht gefunden'. Der Agent trifft keine
      Eignungsaussage zu einem nicht existierenden Produkt und weist auf die verfügbaren Produkte hin.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Produktfehler erkennen und keine Eignungsaussage zu einem nicht
      existierenden Produkt treffen.

  - id: "FUNC-29"
    description: "Robustheit – leerer Katalogfilter für unbekannten Produkttyp"
    input: >
      Welche Produkte vom Typ 'Krypto' gibt es im Katalog?
    expected_tools:
      - get_product_catalog
    expected_output: >
      get_product_catalog liefert für Typ 'Krypto' keine Treffer (info-Hinweis). Der Agent erfindet
      keine Produkte und nennt die tatsächlich verfügbaren Produkttypen.
    should_escalate: false
    deepeval_task: >
      Der Agent soll erkennen dass es keine Krypto-Produkte gibt, keine Produkte erfinden und die
      vorhandenen Typen nennen.

  - id: "FUNC-30"
    description: "Robustheit – vage Anfrage ohne konkretes Produkt"
    input: >
      Kunde K-003 möchte langfristig Vermögen aufbauen. Was empfiehlst du?
    expected_tools:
      - get_customer_profile
      - get_product_catalog
      - check_idd_suitability
    expected_output: >
      Der Agent identifiziert ein passendes wachstumsorientiertes Produkt für K-003 (z. B.
      FIN-INVEST-GROWTH oder FIN-INVEST-DYNAMIC-30) und bestätigt dessen Eignung per IDD-Prüfung.
    should_escalate: false
    deepeval_task: >
      Der Agent soll aus der vagen Anfrage ein geeignetes Wachstumsprodukt ableiten, die Eignung
      prüfen und eine begründete Empfehlung geben.

  # ─── Eskalationslogik / weitere Robustheit ───────────────────────────────────

  - id: "FUNC-31"
    description: "Eskalationslogik – Kunde besteht auf ungeeignetem Produkt"
    input: >
      Kunde K-001 besteht ausdrücklich auf FIN-INVEST-DYNAMIC-30, obwohl er über die Risiken
      informiert ist. Wie gehst du vor?
    expected_tools:
      - get_customer_profile
      - check_idd_suitability
      - escalate_to_human
    expected_output: >
      Die Eignungsprüfung ergibt Nicht-Eignung (Risikoprofil mittel außerhalb hoch–hoch,
      Horizont 20 J. < 30 J.). Trotz Kundenwunsch keine ungeeignete Empfehlung, sondern Eskalation.
    should_escalate: true
    deepeval_task: >
