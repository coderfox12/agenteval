      Horizont 20 J. < 30 J.). Für das ungeeignete Produkt wird eskaliert.
    should_escalate: true
    deepeval_task: >
      Der Agent soll beide Produkte prüfen, FIN-PENSION-CLASSIC als geeignet und
      FIN-INVEST-DYNAMIC-30 als nicht geeignet einstufen und für letzteres eskalieren.

