      FIN-PENSION-CLASSIC) und bestätigt dessen Eignung per IDD-Prüfung (Risikoprofil mittel,
      Horizont 20 J., Budget 300 EUR – alle Kriterien erfüllt).
    should_escalate: false
    deepeval_task: >
      Der Agent soll aus der vagen Anfrage ein geeignetes Altersvorsorgeprodukt ableiten,
      die Eignung für K-001 prüfen und eine begründete Empfehlung geben.

  - id: "UC1-33"
    description: "Eskalationslogik – Kunde besteht auf ungeeignetem Produkt"
    category: "escalation"
    input: >
