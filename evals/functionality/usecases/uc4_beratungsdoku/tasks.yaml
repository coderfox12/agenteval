# UC4 – Beratungsdokumentations-Agent (§61 VVG)
# Jeder Task erstellt ein Beratungsprotokoll aus einem Gesprächstranskript.
# Bewertet mit: TaskCompletionMetric, HallucinationMetric, required_fields-Check
# HallucinationMetric: niedriger Score = mehr Halluzination = schlechter

tasks:

  - id: "UC4-01"
    description: "Vollständiges Protokoll – alle Pflichtfelder vorhanden"
    category: "protocol_generation"
    input: >
      Erstelle aus Transkript TRANS-001 ein vollständiges Beratungsprotokoll
      nach §61 VVG mit allen Pflichtfeldern.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Vollständiges §61-VVG-Protokoll: Kundenwunsch (Todesfallabsicherung),
      Bedarfsanalyse (20 Jahre, 80 EUR Budget), Empfehlung OVB Life Premium,
      Begründung, Risikohinweise (kein Rückkaufswert), Prämie 30 EUR, Laufzeit 20 Jahre,
      Datum 2025-03-15. Alle 9 Pflichtfelder vorhanden. vvg_compliant=True.
    should_escalate: false
    deepeval_task: >
      Der Agent soll alle 4 Workflow-Schritte durchlaufen und ein vollständiges,
      §61-VVG-konformes Protokoll erstellen. Alle 9 Pflichtfelder müssen im
      Protokoll enthalten sein. flag_missing_information ist nicht erforderlich.

  - id: "UC4-02"
    description: "Unvollständiges Transkript – fehlende Pflichtfelder melden"
    category: "missing_fields"
    input: >
      Erstelle aus Transkript TRANS-002 ein Beratungsprotokoll nach §61 VVG.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Protokoll erstellt mit fehlenden Pflichtfeldern: bedarfsanalyse, begruendung,
      risikohinweise sind None (nicht im Gespräch erwähnt).
      flag_missing_information aufgerufen mit 3 fehlenden Feldern.
      Felder als [FEHLT – NACHTRAG ERFORDERLICH] markiert. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die 3 fehlenden Pflichtfelder (bedarfsanalyse, begruendung,
      risikohinweise) erkennen, das Protokoll mit Platzhaltern erstellen und
      flag_missing_information mit allen fehlenden Feldern aufrufen.

  - id: "UC4-03"
    description: "Halluzinations-Test: Nicht genannte Felder dürfen nicht erfunden werden"
    category: "hallucination"
    input: >
      Erstelle aus Transkript TRANS-003 ein vollständiges Beratungsprotokoll.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Protokoll ohne halluzinierte Werte: praemie_eur und laufzeit_jahre wurden im
      Gespräch NICHT erwähnt und sind als [FEHLT] markiert. Agent erfindet keine
      Prämie oder Laufzeit. flag_missing_information aufgerufen.
    should_escalate: false
    deepeval_task: >
      Der Agent darf keine Werte für praemie_eur und laufzeit_jahre erfinden,
      da diese im Transkript nicht vorkommen. Diese Felder müssen als fehlend
      markiert sein. Jede erfundene Zahl gilt als Halluzination (Misserfolg).

  - id: "UC4-04"
    description: "Pflichtfeld-Vollständigkeits-Check ohne Protokoll-Generierung"
    category: "field_check"
    input: >
      Prüfe ob Transkript TRANS-001 alle §61-VVG-Pflichtfelder enthält.
      Erstelle noch kein vollständiges Protokoll.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
    expected_output: >
      Alle 9 Pflichtfelder vorhanden (100% Vollständigkeit). compliant=True.
      Keine Nachpflege erforderlich.
    should_escalate: false
    deepeval_task: >
      Der Agent soll nur die Entitäts-Extraktion und den Pflichtfeld-Check durchführen,
      KEIN generate_protocol aufrufen. Ergebnis: alle Felder vorhanden, vvg_compliant=True.

  # ─── Vollständiges Transkript (TRANS-001): Varianten ─────────────────────────

  - id: "UC4-05"
    description: "Vollständiges Protokoll – strukturierte Ausgabe mit allen vier Abschnitten"
    category: "protocol_generation"
    input: >
      Erstelle aus Transkript TRANS-001 ein §61-VVG-Beratungsprotokoll und gib die vier
      Abschnitte (Kundenwunsch, Empfehlung, Konditionen, Risikohinweise) strukturiert aus.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Vollständiges Protokoll mit allen Pflichtfeldern: kundenwunsch, bedarfsanalyse, empfehlung,
      begruendung, risikohinweise, produktbezeichnung, praemie_eur (30), laufzeit_jahre (20),
      beratungsdatum (2025-03-15). vvg_compliant=True, kein Nachtrag erforderlich.
    should_escalate: false
    deepeval_task: >
      Der Agent soll ein vollständiges, §61-VVG-konformes Protokoll mit allen 9 Pflichtfeldern
      in strukturierten Abschnitten erstellen. flag_missing_information ist nicht erforderlich.

  - id: "UC4-06"
    description: "Extraktion – nur Entitäten aus TRANS-001 auslesen"
    category: "extraction"
    input: >
      Extrahiere ausschließlich die §61-VVG-relevanten Entitäten aus Transkript TRANS-001
      und gib sie strukturiert zurück. Erstelle noch kein Protokoll.
    expected_tools:
      - extract_dialogue_entities
    expected_output: >
      Strukturierte Entitäten aus TRANS-001: kundenwunsch, bedarfsanalyse, empfehlung, begruendung,
      risikohinweise, produktbezeichnung, praemie_eur (30), laufzeit_jahre (20), beratungsdatum
      (2025-03-15). Keine Protokoll-Generierung.
    should_escalate: false
    deepeval_task: >
      Der Agent soll nur extract_dialogue_entities aufrufen und die extrahierten Felder ausgeben,
      ohne generate_protocol oder flag_missing_information.

  - id: "UC4-07"
    description: "Pflichtfeld-Check – Vollständigkeit von TRANS-001 bestätigen"
    category: "field_check"
    input: >
      Prüfe mit dem Pflichtfeld-Check, ob Transkript TRANS-001 alle §61-VVG-Pflichtfelder enthält,
      und nenne die Vollständigkeitsquote.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
    expected_output: >
      check_required_fields ergibt compliant=True, alle 9 Pflichtfelder vorhanden
      (kundenwunsch, bedarfsanalyse, empfehlung, begruendung, risikohinweise, produktbezeichnung,
      praemie_eur, laufzeit_jahre, beratungsdatum), completeness_pct=100. Kein Nachtrag nötig.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Pflichtfeld-Check durchführen und die 100%-Vollständigkeit von TRANS-001
      bestätigen, ohne flag_missing_information.

  - id: "UC4-08"
    description: "Vollständiges Protokoll – expliziter Konformitätsnachweis"
    category: "protocol_generation"
    input: >
      Erstelle aus TRANS-001 ein Beratungsprotokoll und bestätige ausdrücklich die
      §61-VVG-Konformität mit Verweis auf die enthaltenen Pflichtfelder.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Protokoll erstellt, vvg_compliant=True. Alle 9 Pflichtfelder benannt: kundenwunsch,
      bedarfsanalyse, empfehlung, begruendung, risikohinweise, produktbezeichnung, praemie_eur,
      laufzeit_jahre, beratungsdatum. Konformität nach §61 VVG bestätigt.
    should_escalate: false
    deepeval_task: >
      Der Agent soll ein vollständiges Protokoll erstellen und die §61-VVG-Konformität mit den
      enthaltenen Pflichtfeldern belegen.

  # ─── Unvollständiges Transkript (TRANS-002): Varianten ───────────────────────

  - id: "UC4-09"
    description: "Fehlende Felder – TRANS-002 mit Nachpflege-Anforderung"
    category: "missing_fields"
    input: >
      Erstelle aus Transkript TRANS-002 ein Beratungsprotokoll nach §61 VVG und melde alle
      fehlenden Pflichtfelder zur Nachpflege.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Protokoll mit 3 fehlenden Pflichtfeldern: bedarfsanalyse, begruendung, risikohinweise (None).
      Als [FEHLT – NACHTRAG ERFORDERLICH] markiert. flag_missing_information mit 3 Feldern und
      Frist 5 Werktage. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die 3 fehlenden Felder (bedarfsanalyse, begruendung, risikohinweise) erkennen,
      das Protokoll mit Platzhaltern erstellen und flag_missing_information aufrufen.

  - id: "UC4-10"
    description: "Pflichtfeld-Check – TRANS-002, Unvollständigkeit ohne Protokoll"
    category: "field_check"
    input: >
      Prüfe mit dem Pflichtfeld-Check, welche §61-VVG-Pflichtfelder in Transkript TRANS-002 fehlen.
      Erstelle noch kein Protokoll.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
    expected_output: >
      check_required_fields ergibt compliant=False. Fehlende Felder: bedarfsanalyse, begruendung,
      risikohinweise. Vorhandene Felder: kundenwunsch, empfehlung, produktbezeichnung, praemie_eur,
      laufzeit_jahre, beratungsdatum. completeness_pct rund 67.
    should_escalate: false
    deepeval_task: >
      Der Agent soll ausschließlich Extraktion und Pflichtfeld-Check durchführen und die 3
      fehlenden Felder benennen, ohne generate_protocol oder flag_missing_information.

  - id: "UC4-11"
    description: "Fehlende Felder – TRANS-002, Fokus auf Risikohinweise"
    category: "missing_fields"
    input: >
      Erstelle aus TRANS-002 ein Protokoll und prüfe insbesondere, ob die Risikohinweise
      dokumentiert sind. Leite bei Lücken die Nachpflege ein.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Risikohinweise fehlen im Transkript TRANS-002 (None), ebenso bedarfsanalyse und begruendung.
      Der Agent erfindet keine Risikohinweise, markiert sie als [FEHLT] und ruft
      flag_missing_information auf. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent soll das Fehlen der Risikohinweise (und der weiteren zwei Felder) erkennen, nichts
      erfinden und flag_missing_information aufrufen.

  - id: "UC4-12"
    description: "Halluzinations-Abwehr – TRANS-002, fehlende Begründung nicht erfinden"
    category: "hallucination"
    input: >
      Erstelle aus Transkript TRANS-002 ein vollständiges Beratungsprotokoll mit Begründung der
      Empfehlung.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Die Begründung wurde im Gespräch nicht dokumentiert (begruendung=None) und wird NICHT
      erfunden, sondern als [FEHLT] markiert. Auch bedarfsanalyse und risikohinweise fehlen.
      flag_missing_information aufgerufen. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent darf die fehlende Begründung nicht halluzinieren, sondern muss sie als fehlend
      markieren und flag_missing_information aufrufen.

  # ─── Halluzinationsfalle (TRANS-003): Varianten ──────────────────────────────

  - id: "UC4-13"
    description: "Halluzinations-Abwehr – TRANS-003, Prämie nicht erfinden"
    category: "hallucination"
    input: >
      Erstelle aus Transkript TRANS-003 ein Beratungsprotokoll inklusive der monatlichen Prämie.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Die Prämie (praemie_eur) wurde im Gespräch nie genannt (None) und wird NICHT erfunden,
      sondern als [FEHLT] markiert. Auch laufzeit_jahre fehlt. flag_missing_information aufgerufen.
      vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent darf keine Prämie erfinden, muss praemie_eur (und laufzeit_jahre) als fehlend
      markieren und flag_missing_information aufrufen.

  - id: "UC4-14"
    description: "Halluzinations-Abwehr – TRANS-003, Laufzeit nicht erfinden"
    category: "hallucination"
    input: >
      Erstelle aus Transkript TRANS-003 ein vollständiges Protokoll und trage die Vertragslaufzeit ein.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Die Laufzeit (laufzeit_jahre) wurde im Gespräch nicht besprochen (None) und wird NICHT
      erfunden, sondern als [FEHLT] markiert. Auch praemie_eur fehlt. flag_missing_information
      aufgerufen. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent darf keine Laufzeit erfinden, muss laufzeit_jahre (und praemie_eur) als fehlend
      markieren und flag_missing_information aufrufen.

  - id: "UC4-15"
    description: "Pflichtfeld-Check – TRANS-003, fehlende Konditionen benennen"
    category: "field_check"
    input: >
      Prüfe mit dem Pflichtfeld-Check, welche Felder in Transkript TRANS-003 fehlen.
      Noch kein Protokoll erstellen.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
    expected_output: >
      check_required_fields ergibt compliant=False. Fehlende Felder: praemie_eur, laufzeit_jahre.
      Vorhandene Felder: kundenwunsch, bedarfsanalyse, empfehlung, begruendung, risikohinweise,
      produktbezeichnung, beratungsdatum. completeness_pct rund 78.
    should_escalate: false
    deepeval_task: >
      Der Agent soll nur Extraktion und Pflichtfeld-Check durchführen und praemie_eur und
      laufzeit_jahre als fehlend benennen, ohne flag_missing_information.

  - id: "UC4-16"
    description: "Halluzinations-Abwehr – TRANS-003, beide Konditionen fehlen"
    category: "hallucination"
    input: >
      Erstelle aus TRANS-003 ein Protokoll mit Prämie und Laufzeit und melde fehlende Angaben.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Sowohl praemie_eur als auch laufzeit_jahre fehlen (None) und werden als [FEHLT] markiert,
      nicht erfunden. flag_missing_information mit beiden Feldern aufgerufen. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent darf weder Prämie noch Laufzeit erfinden, muss beide als fehlend markieren und
      flag_missing_information aufrufen.

  # ─── Fehlerbehandlung / Robustheit ───────────────────────────────────────────

  - id: "UC4-17"
    description: "Fehlerbehandlung – unbekannte Transkript-ID"
    category: "error_handling"
    input: >
      Erstelle aus Transkript TRANS-999 ein Beratungsprotokoll nach §61 VVG.
    expected_tools:
      - extract_dialogue_entities
    expected_output: >
      extract_dialogue_entities liefert einen Fehler: Transkript 'TRANS-999' nicht gefunden
      (available_transcripts: TRANS-001, TRANS-002, TRANS-003). Der Agent erstellt kein Protokoll
      mit erfundenen Daten und fordert eine gültige Transkript-ID an.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den Fehler erkennen, keine Daten erfinden und eine gültige Transkript-ID
      anfordern, statt ein Protokoll zu generieren.

  - id: "UC4-18"
    description: "Halluzinations-Abwehr – TRANS-003, Fokus nur auf tatsächlich Genanntes"
    category: "hallucination"
    input: >
      Fasse für TRANS-003 zusammen, welche Angaben der Kunde tatsächlich gemacht hat, und erstelle
      dann ein Protokoll.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Tatsächlich genannt: Kapitalanlage mit hohem Risiko, Empfehlung FIN-INVEST-GROWTH,
      Risikohinweis Kapitalverlust, Datum 2025-05-10. Nicht genannt: praemie_eur, laufzeit_jahre
      (als [FEHLT] markiert, nicht erfunden). flag_missing_information aufgerufen.
    should_escalate: true
    deepeval_task: >
      Der Agent soll klar zwischen tatsächlich genannten und fehlenden Angaben trennen, nichts
      erfinden und flag_missing_information aufrufen.

  - id: "UC4-19"
    description: "Vollständiges Protokoll – TRANS-001 mit Prämien- und Laufzeitangabe"
    category: "protocol_generation"
    input: >
      Erstelle aus TRANS-001 ein Protokoll und weise Prämie und Laufzeit explizit aus.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Protokoll mit praemie_eur=30 und laufzeit_jahre=20 (aus dem Transkript belegt), sowie allen
      übrigen Pflichtfeldern (kundenwunsch, bedarfsanalyse, empfehlung, begruendung, risikohinweise,
      produktbezeichnung, beratungsdatum). vvg_compliant=True.
    should_escalate: false
    deepeval_task: >
      Der Agent soll das vollständige Protokoll aus TRANS-001 erstellen und Prämie (30) und
      Laufzeit (20) korrekt aus dem Transkript ausweisen.

  - id: "UC4-20"
    description: "Fehlende Felder – TRANS-002, Nachpflege-Frist kommunizieren"
    category: "missing_fields"
    input: >
      Erstelle aus TRANS-002 ein Protokoll, melde die fehlenden Felder und nenne dem Berater die
      Nachpflege-Frist.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      3 fehlende Felder (bedarfsanalyse, begruendung, risikohinweise) als [FEHLT] markiert.
      flag_missing_information nennt eine Frist von 5 Werktagen. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die fehlenden Felder melden und die 5-Werktage-Nachpflegefrist aus
      flag_missing_information kommunizieren.

  - id: "UC4-21"
    description: "Vollständiges Protokoll – TRANS-001, Kundenwunsch und Bedarfsanalyse betonen"
    category: "protocol_generation"
    input: >
      Erstelle aus TRANS-001 ein Protokoll und stelle Kundenwunsch und Bedarfsanalyse besonders
      heraus.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Protokoll mit kundenwunsch (Todesfallabsicherung) und bedarfsanalyse (20 Jahre, max 80 EUR),
      dazu empfehlung, begruendung, risikohinweise, produktbezeichnung, praemie_eur, laufzeit_jahre,
      beratungsdatum. Alle 9 Pflichtfelder vorhanden, vvg_compliant=True.
    should_escalate: false
    deepeval_task: >
      Der Agent soll das vollständige Protokoll erstellen und Kundenwunsch sowie Bedarfsanalyse
      inhaltlich korrekt aus TRANS-001 wiedergeben.

  - id: "UC4-22"
    description: "Pflichtfeld-Check – TRANS-002, exakte Nennung fehlender Felder"
    category: "field_check"
    input: >
      Welche §61-VVG-Pflichtfelder fehlen in TRANS-002? Gib nur die Liste der fehlenden Felder aus.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
    expected_output: >
      Fehlende Pflichtfelder in TRANS-002: bedarfsanalyse, begruendung, risikohinweise.
      Die übrigen Felder (kundenwunsch, empfehlung, produktbezeichnung, praemie_eur, laufzeit_jahre,
      beratungsdatum) sind vorhanden.
    should_escalate: false
    deepeval_task: >
      Der Agent soll ausschließlich die drei fehlenden Felder korrekt auflisten, ohne Protokoll
      oder flag_missing_information.

  - id: "UC4-23"
    description: "Halluzinations-Abwehr – TRANS-003, keine Renditeversprechen erfinden"
    category: "hallucination"
    input: >
      Erstelle aus TRANS-003 ein Protokoll und nenne die im Gespräch zugesagte erwartete Rendite.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      Im Transkript TRANS-003 wurde keine erwartete Rendite zugesagt. Der Agent erfindet keine
      Renditezahl. Zusätzlich fehlen praemie_eur und laufzeit_jahre ([FEHLT]).
      flag_missing_information aufgerufen. vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent darf keine im Gespräch nicht zugesagte Rendite erfinden und muss die fehlenden
      Pflichtfelder (praemie_eur, laufzeit_jahre) melden.

  - id: "UC4-24"
    description: "Robustheit – Paraphrasierter Auftrag für TRANS-001"
    category: "robustness"
    input: >
      Bring das Beratungsgespräch mit der ID TRANS-001 in die vorgeschriebene Protokollform
      nach §61 VVG.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Vollständiges §61-VVG-Protokoll aus TRANS-001 mit allen 9 Pflichtfeldern (kundenwunsch,
      bedarfsanalyse, empfehlung, begruendung, risikohinweise, produktbezeichnung, praemie_eur,
      laufzeit_jahre, beratungsdatum). vvg_compliant=True.
    should_escalate: false
    deepeval_task: >
      Der Agent soll den paraphrasierten Auftrag korrekt verstehen und das vollständige Protokoll
      aus TRANS-001 erstellen.

  - id: "UC4-25"
    description: "Fehlende Felder – TRANS-002, Protokoll mit Platzhaltern betonen"
    category: "missing_fields"
    input: >
      Erstelle aus TRANS-002 ein Protokoll, in dem fehlende Angaben deutlich als nachzupflegen
      gekennzeichnet sind, und melde sie.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
      - flag_missing_information
    expected_output: >
      bedarfsanalyse, begruendung und risikohinweise erscheinen im Protokoll als
      [FEHLT – NACHTRAG ERFORDERLICH]. flag_missing_information listet genau diese 3 Felder.
      vvg_compliant=False.
    should_escalate: true
    deepeval_task: >
      Der Agent soll die Platzhalter-Kennzeichnung der fehlenden Felder umsetzen und
      flag_missing_information mit den drei Feldern aufrufen.

  - id: "UC4-26"
    description: "Extraktion – TRANS-002, fehlende Felder bereits bei Extraktion sichtbar"
    category: "extraction"
    input: >
      Extrahiere die Entitäten aus TRANS-002 und zeige, welche Felder als nicht besprochen (None)
      markiert sind.
    expected_tools:
      - extract_dialogue_entities
    expected_output: >
      extract_dialogue_entities liefert incomplete_fields = bedarfsanalyse, begruendung,
      risikohinweise (None). Vorhanden: kundenwunsch, empfehlung, produktbezeichnung, praemie_eur,
      laufzeit_jahre, beratungsdatum.
    should_escalate: false
    deepeval_task: >
      Der Agent soll nur extrahieren und die als None markierten Felder (bedarfsanalyse,
      begruendung, risikohinweise) benennen, ohne Protokoll oder Flag.

