  # ─── Neuer Fall: zwei verglichene Produkte, nur eines empfohlen (TRANS-006) ─

  - id: "UC4-35"
    description: "Halluzinations-Abwehr – nur das tatsächlich empfohlene Produkt nennen"
    input: >
      Erstelle aus Transkript TRANS-006 ein Beratungsprotokoll nach §61 VVG. Im Gespräch wurden
      zwei Produkte verglichen.
    expected_tools:
      - extract_dialogue_entities
      - check_required_fields
      - generate_protocol
    expected_output: >
      Als empfehlung und produktbezeichnung erscheint ausschließlich "OVB Life Basic" (22 EUR,
      20 Jahre) – das im Gespräch tatsächlich gewählte Produkt. "OVB Life Premium" wird höchstens
      in der Begründung als verworfene Alternative erwähnt, nicht als Empfehlung. Alle 9 Pflichtfelder
      vorhanden, vvg_compliant=True.
    should_escalate: false
    deepeval_task: >
      Der Agent muss zwischen dem verglichenen, aber abgelehnten Produkt (OVB Life Premium) und dem
      tatsächlich empfohlenen Produkt (OVB Life Basic) unterscheiden und darf sie im Protokoll nicht
      verwechseln oder vermischen.

  - id: "UC4-36"
    description: "Extraktion TRANS-006 – Konditionen des empfohlenen, nicht des verglichenen Produkts"
    input: >
      Extrahiere die §61-VVG-relevanten Entitäten aus TRANS-006. Erstelle noch kein Protokoll.
    expected_tools:
      - extract_dialogue_entities
    expected_output: >
      Extrahierte Konditionen gehören zum empfohlenen Produkt OVB Life Basic: praemie_eur=22,
      laufzeit_jahre=20. Die 30-EUR-Prämie von OVB Life Premium (der verworfenen Alternative) wird
      nicht als praemie_eur übernommen.
    should_escalate: false
    deepeval_task: >
      Der Agent soll ausschließlich die Konditionen des empfohlenen Produkts (OVB Life Basic)
      extrahieren und nicht mit denen der verglichenen, aber abgelehnten Alternative verwechseln.
